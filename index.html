<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaheer Ahmad Khan Advocate - LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-72 bg-white border-r shadow-2xl">
        <div class="p-6 bg-emerald-700 text-white">
            <h1 class="text-2xl font-bold">Zaheer Ahmad Khan</h1>
            <p class="text-emerald-100 text-sm">Advocate High Court</p>
        </div>
        
        <div class="p-4 space-y-1 text-gray-700">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-emerald-50 text-emerald-700 rounded-xl font-medium">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
                <i class="fas fa-users"></i> Clients
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
                <i class="fas fa-briefcase"></i> Cases
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
                <i class="fas fa-calendar"></i> Hearings
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
                <i class="fas fa-folder"></i> Documents
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
                <i class="fas fa-robot"></i> ZA Legal AI
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
                <i class="fas fa-file-invoice"></i> Finance
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-auto">
        <h1 class="text-4xl font-bold">Dashboard</h1>
        <p class="text-gray-600 mt-2">Good Morning, Zaheer Sahab</p>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-10">
            <div class="bg-white p-6 rounded-3xl shadow">
                <p class="text-sm text-gray-500">Today's Hearings</p>
                <p class="text-5xl font-bold mt-2 text-emerald-600">04</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow">
                <p class="text-sm text-gray-500">Pending Fees</p>
                <p class="text-5xl font-bold mt-2 text-amber-600">₹8,45,000</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow">
                <p class="text-sm text-gray-500">Active Cases</p>
                <p class="text-5xl font-bold mt-2">27</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow">
                <p class="text-sm text-gray-500">New Clients</p>
                <p class="text-5xl font-bold mt-2 text-blue-600">03</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
